name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Get Flutter dependencies
      run: |
        flutter clean
        flutter pub get
      
    - name: Build Flutter web app
      run: |
        flutter build web --release --pwa-strategy=none --base-href=/
        
    - name: Deploy to Hostinger via SFTP
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: wangyucode/sftp-upload-action@v2.0.2
      with:
        host: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        localDir: build/web/
        remoteDir: domains/yc-pagsanjan.site/public_html/
        port: 22
        
    - name: Notify deployment success
      if: success()
      run: |
        echo "Deployment to Hostinger completed successfully!"
        echo "Your app is now live at yc-pagsanjan.site"
