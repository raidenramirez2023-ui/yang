name: Deploy to Hostinger

on:
  pull_request:
    types: [closed]
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Get Flutter dependencies
      run: |
        flutter clean
        flutter pub get
      
    - name: Setup environment variables
      run: |
        echo "PAYMONGO_PUBLIC_KEY=${{ secrets.PAYMONGO_PUBLIC_KEY }}" >> .env
        echo "PAYMONGO_SECRET_KEY=${{ secrets.PAYMONGO_SECRET_KEY }}" >> .env
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
        
    - name: Build Flutter web app
      run: |
        flutter build web --release --base-href=/ --web-renderer canvaskit
        
    - name: Check build output
      run: |
        ls -la build/web/
        echo "Build completed successfully!"
        
    - name: Deploy to Hostinger via FTP
      if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: build/web/
        server-dir: /
        dry-run: false
        protocol: ftp
        port: 21
        timeout: 600000
        security: loose
        
    - name: Notify deployment success
      if: success()
      run: |
        echo "Deployment to Hostinger completed successfully!"
        echo "Your app is now live at yc-pagsanjan.site"
