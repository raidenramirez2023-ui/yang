name: Deploy to Hostinger

on:
  push:
    branches: [ main, master, feature/kitchen-inv ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Get Flutter dependencies
      run: flutter pub get
      
    - name: Build Flutter web app
      run: |
        flutter build web --release --web-renderer=canvaskit --base-href=/
        
    - name: Deploy to Hostinger via FTP
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        # Install FTP client
        sudo apt-get update
        sudo apt-get install -y lftp
        
        # Deploy using lftp directly
        lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode on
          open ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_HOST }}
          cd public_html
          mirror --reverse --delete --verbose build/web/ .
          quit
        "
        
    - name: Notify deployment success
      if: success()
      run: |
        echo "Deployment to Hostinger completed successfully!"
        echo "Your app is now live at yc-pagsanjan.site"
